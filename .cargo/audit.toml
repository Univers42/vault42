# cargo-audit policy — mirrors deny.toml's [advisories].ignore so the CI
# supply-chain job (cargo audit + cargo deny) is deterministic. Each ignored ID
# is an assessed advisory with no drop-in fix; see deny.toml for the per-ID reason
# and upgrade path. Remove an entry once its fix lands (e.g. russh >=0.60.3).
[advisories]
ignore = [
    "RUSTSEC-2026-0154", # russh 0.45 — fix is a breaking >=0.60.3 upgrade (follow-up)
    "RUSTSEC-2026-0153", # russh-cryptovec 0.7 — same russh upgrade
    "RUSTSEC-2023-0071", # rsa Marvin timing sidechannel — no patched release
    "RUSTSEC-2025-0141", # bincode 1.3.3 — intentionally frozen, no successor
    "RUSTSEC-2025-0134", # rustls-pemfile — archived into rustls-pki-types
]
