[package]
name = "vault42-proto"
description = "vault42 protobuf wire types (vault/v1 + authz/v1), tonic-generated"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# NOTE: this crate's source is generated by tonic/prost at build time; it does not
# opt into the workspace lints (which forbid unsafe and deny all clippy warnings)
# because generated code is not held to the hand-written-code norm.

[dependencies]
tonic.workspace = true
prost.workspace = true

[build-dependencies]
tonic-build.workspace = true
protoc-bin-vendored.workspace = true
