name: vault42-ci

on:
  push:
    branches: [main, develop]
  pull_request:

# Mirrors grobase's strictness: fmt clean, clippy warnings-as-errors, tests green,
# supply-chain (audit + deny) clean, no committed secrets. buf (P1) and semgrep (P8)
# are added with the phases that introduce protobuf and the SSH surface.
jobs:
  rust:
    runs-on: ubuntu-latest
    container: public.ecr.aws/docker/library/rust:1.96-slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add clippy rustfmt
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  supply-chain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit cargo-deny --locked
      - run: cargo audit
      - run: cargo deny check

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Run the OSS gitleaks BINARY (MIT), not gitleaks-action — the action
      # paywalls organization repos. Download is checksum-verified before use.
      - name: gitleaks (secret scan)
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          asset="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$base/$asset" -o "$asset"
          curl -sSfL "$base/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep " $asset\$" checksums.txt | sha256sum -c -
          tar xzf "$asset" gitleaks
          ./gitleaks dir . --no-banner --redact --exit-code 1 --config .gitleaks.toml
